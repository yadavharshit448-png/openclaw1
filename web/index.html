<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Android Autopilot Dashboard</title>
  <style>
    :root { --bg:#081120; --card:#111827; --muted:#94a3b8; --text:#f8fafc; --accent:#38bdf8; --border:#1f2937; --ok:#22c55e; --warn:#f59e0b; }
    * { box-sizing:border-box; }
    body { margin:0; background:linear-gradient(180deg,#081120,#0f172a); color:var(--text); font:16px/1.5 Inter,system-ui,sans-serif; }
    .wrap { max-width:1150px; margin:0 auto; padding:32px 20px 60px; }
    .hero { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:20px; flex-wrap:wrap; }
    h1 { margin:0 0 8px; font-size:38px; }
    .hero p, p { color:var(--muted); }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    button, .btn { background:var(--accent); color:#082f49; border:none; border-radius:12px; padding:12px 16px; font-weight:800; cursor:pointer; text-decoration:none; display:inline-block; }
    .btn.secondary, button.secondary { background:transparent; color:var(--text); border:1px solid var(--border); }
    .stats { display:flex; gap:12px; flex-wrap:wrap; margin:18px 0 28px; }
    .stat { background:rgba(17,24,39,.92); border:1px solid var(--border); border-radius:16px; padding:14px 16px; min-width:160px; }
    .stat b { display:block; font-size:24px; color:var(--text); }
    .message { margin:12px 0 20px; padding:12px 14px; border-radius:12px; background:rgba(56,189,248,.12); border:1px solid rgba(56,189,248,.3); color:#dbeafe; display:none; white-space:pre-wrap; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); gap:18px; }
    .card { background:rgba(17,24,39,.92); border:1px solid var(--border); border-radius:20px; padding:20px; box-shadow:0 12px 30px rgba(0,0,0,.25); }
    .row.top { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    h2 { margin:0; font-size:24px; }
    h3 { margin:18px 0 8px; font-size:15px; color:var(--accent); text-transform:uppercase; letter-spacing:.08em; }
    .tagline { color:#cbd5e1; margin:6px 0 0; }
    .status { background:rgba(34,197,94,.14); color:#86efac; border:1px solid rgba(34,197,94,.4); border-radius:999px; padding:6px 10px; font-size:12px; font-weight:700; white-space:nowrap; }
    ul { margin:0; padding-left:18px; color:var(--text); }
    li { margin:5px 0; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
    .chip { font-size:12px; color:#dbeafe; background:rgba(56,189,248,.12); border:1px solid rgba(56,189,248,.35); padding:6px 10px; border-radius:999px; }
    .links { display:flex; gap:8px; flex-wrap:wrap; margin-top:16px; }
    .links a { font-size:13px; }
    code { color:#bfdbfe; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <div style="color:#94a3b8">Android app factory dashboard</div>
        <h1>Android Autopilot</h1>
        <p>Browse generated apps, inspect specs and READMEs, and trigger the next app build on demand.</p>
      </div>
      <div class="actions">
        <button id="generateBtn">Generate next app now</button>
        <a class="btn secondary" href="/files/docs/viewing-apps.md" target="_blank">Open docs</a>
      </div>
    </div>

    <div id="message" class="message"></div>
    <div id="stats" class="stats"></div>
    <div id="grid" class="grid"></div>
  </div>

  <script>
    async function loadApps() {
      const res = await fetch('/api/apps');
      const data = await res.json();
      renderStats(data.stats);
      renderApps(data.apps);
    }

    function renderStats(stats) {
      const el = document.getElementById('stats');
      el.innerHTML = `
        <div class="stat"><span>Total specs</span><b>${stats.specs}</b></div>
        <div class="stat"><span>Generated apps</span><b>${stats.apps}</b></div>
        <div class="stat"><span>Idea briefs</span><b>${stats.ideas}</b></div>
      `;
    }

    function cardLink(label, href) {
      return href ? `<a class="btn secondary" href="${href}" target="_blank">${label}</a>` : '';
    }

    function renderApps(apps) {
      const el = document.getElementById('grid');
      el.innerHTML = apps.map(app => `
        <section class="card">
          <div class="row top">
            <div>
              <h2>${app.app_name}</h2>
              <p class="tagline">${app.tagline || ''}</p>
            </div>
            <span class="status">${app.status}</span>
          </div>
          <p><strong>Slug:</strong> ${app.slug}</p>
          <p><strong>Package:</strong> ${app.package_name}</p>
          <p><strong>Target user:</strong> ${app.target_user}</p>
          <p><strong>Problem:</strong> ${app.problem}</p>
          <p><strong>Solution:</strong> ${app.solution}</p>
          <div class="chips">${(app.screens || []).map(s => `<span class="chip">${s.title}</span>`).join('')}</div>
          <h3>V1 features</h3>
          <ul>${(app.feature_v1 || []).map(f => `<li>${f}</li>`).join('')}</ul>
          <div class="links">
            ${cardLink('Spec JSON', app.spec_url)}
            ${cardLink('App README', app.readme_url)}
            ${cardLink('Idea brief', app.idea_url)}
          </div>
          <p><strong>Folder:</strong> <code>${app.app_path}</code></p>
        </section>`).join('');
    }

    async function generateNext() {
      const btn = document.getElementById('generateBtn');
      const msg = document.getElementById('message');
      btn.disabled = true;
      btn.textContent = 'Generating...';
      msg.style.display = 'block';
      msg.textContent = 'Creating next app...';
      try {
        const res = await fetch('/api/generate-next', { method: 'POST' });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'Generation failed');
        const r = data.result;
        msg.textContent = `Done\nAction: ${r.action}\nSlug: ${r.slug}\nSpec: ${r.spec_path}\nApp: ${r.app_path}`;
        await loadApps();
      } catch (err) {
        msg.textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate next app now';
      }
    }

    document.getElementById('generateBtn').addEventListener('click', generateNext);
    loadApps();
  </script>
</body>
</html>
