name: EAS Build and Submit

on:
  workflow_dispatch:
    inputs:
      app_path:
        description: "App directory to build, e.g. apps/api-price-watch"
        required: false
        default: "apps/api-price-watch"
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - '.github/workflows/eas-build-submit.yml'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_path: ${{ steps.pick.outputs.app_path }}
      app_slug: ${{ steps.pick.outputs.app_slug }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Select app path
        id: pick
        shell: bash
        run: |
          set -euo pipefail
          INPUT_APP_PATH='${{ github.event.inputs.app_path }}'
          if [ -n "$INPUT_APP_PATH" ]; then
            APP_PATH="$INPUT_APP_PATH"
          else
            APP_PATH="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^apps/[^/]\+/' | cut -d/ -f1-2 | sort -u | head -n1 || true)"
          fi

          if [ -z "$APP_PATH" ]; then
            APP_PATH="$(find apps -mindepth 1 -maxdepth 1 -type d | sort | head -n1)"
          fi

          if [ -z "$APP_PATH" ] || [ ! -f "$APP_PATH/package.json" ]; then
            echo "Could not find a valid Expo app directory under apps/"
            exit 1
          fi

          echo "Selected app path: $APP_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "app_slug=$(basename "$APP_PATH")" >> "$GITHUB_OUTPUT"

  build-android:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ needs.prepare.outputs.app_path }}/package.json

      - name: Setup Expo and EAS
        run: npm install -g eas-cli expo

      - name: Install app dependencies
        working-directory: ${{ needs.prepare.outputs.app_path }}
        run: npm install

      - name: Authenticate with Expo
        working-directory: ${{ needs.prepare.outputs.app_path }}
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android AAB
        working-directory: ${{ needs.prepare.outputs.app_path }}
        run: eas build --platform android --non-interactive --profile production
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to Play internal testing
        if: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON != '' }}
        working-directory: ${{ needs.prepare.outputs.app_path }}
        run: |
          printf '%s' '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > google-service-account.json
          eas submit --platform android --non-interactive --latest --profile production
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_KEY_PATH: google-service-account.json

# Notes:
# - This workflow builds a selected app under apps/<slug>/ instead of the monorepo root.
# - Use workflow_dispatch with app_path to build a specific app on demand.
# - Production rollout should stay manual until the first few releases are validated.
