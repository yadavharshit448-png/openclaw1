name: EAS Build and Submit

on:
  workflow_dispatch:
    inputs:
      app_path:
        description: App directory to build, for example apps/support-replay
        required: false
        default: apps/support-replay
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - '.github/workflows/eas-build-submit.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve app path
        id: resolve
        shell: bash
        env:
          INPUT_APP_PATH: ${{ github.event.inputs.app_path }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_APP_PATH:-}" ]; then
            APP_PATH="$INPUT_APP_PATH"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -n "$BEFORE_SHA" ]; then
              APP_PATH="$(git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" | grep '^apps/[^/]\+/' | cut -d/ -f1-2 | sort -u | head -n1 || true)"
            else
              APP_PATH=""
            fi
          fi

          if [ -z "$APP_PATH" ]; then
            APP_PATH="$(find apps -mindepth 1 -maxdepth 1 -type d | sort | head -n1)"
          fi

          if [ -z "$APP_PATH" ] || [ ! -f "$APP_PATH/package.json" ]; then
            echo "Could not find a valid Expo app directory under apps/"
            exit 1
          fi

          echo "Selected app path: $APP_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ steps.resolve.outputs.app_path }}/package.json

      - name: Setup Expo and EAS
        run: npm install -g eas-cli expo

      - name: Install app dependencies
        working-directory: ${{ steps.resolve.outputs.app_path }}
        run: npm install

      - name: Check whether EAS project is already linked
        id: eas_link
        working-directory: ${{ steps.resolve.outputs.app_path }}
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          app = json.loads(Path('app.json').read_text())
          project_id = app.get('expo', {}).get('extra', {}).get('eas', {}).get('projectId')
          print(f"has_project_id={'true' if project_id else 'false'}")
          PY

      - name: Ensure EAS project is linked
        if: steps.eas_link.outputs.has_project_id != 'true'
        working-directory: ${{ steps.resolve.outputs.app_path }}
        run: eas project:init --force --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Authenticate with Expo
        working-directory: ${{ steps.resolve.outputs.app_path }}
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android AAB
        working-directory: ${{ steps.resolve.outputs.app_path }}
        run: eas build --platform android --non-interactive --profile production
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to Play internal testing
        if: env.GOOGLE_SERVICE_ACCOUNT_JSON != ''
        working-directory: ${{ steps.resolve.outputs.app_path }}
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json
          eas submit --platform android --non-interactive --latest --profile production
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_KEY_PATH: google-service-account.json
